<!--
  Fulcrum Leverage Brief — WordPress Popup Embed

  Add this snippet to any WordPress page/post using a Custom HTML block,
  or paste it into your theme's footer via Appearance → Theme Editor,
  or add it via a plugin like "Insert Headers and Footers".

  This creates a floating CTA button and opens the assessment form
  in a full-screen iframe overlay hosted on leverage.fulcrumcollective.io.
-->

<!-- OPTION A: Floating CTA Button (auto-creates the button) -->
<script>
(function() {
  var LEVERAGE_URL = 'https://leverage.fulcrumcollective.io';

  // ── Overlay ──
  var overlay = document.createElement('div');
  overlay.id = 'fulcrum-overlay';
  overlay.style.cssText = 'display:none;position:fixed;inset:0;z-index:999999;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);';

  // ── Iframe container ──
  var wrap = document.createElement('div');
  wrap.style.cssText = 'position:absolute;inset:20px;max-width:720px;margin:auto;background:#F7F5F2;border-radius:16px;overflow:hidden;box-shadow:0 25px 50px rgba(0,0,0,0.25);';

  // ── Close button ──
  var closeBtn = document.createElement('button');
  closeBtn.innerHTML = '&times;';
  closeBtn.setAttribute('aria-label', 'Close');
  closeBtn.style.cssText = 'position:absolute;top:12px;right:16px;z-index:10;background:none;border:none;font-size:28px;color:rgba(0,0,0,0.4);cursor:pointer;line-height:1;';

  // ── Iframe ──
  var iframe = document.createElement('iframe');
  iframe.style.cssText = 'width:100%;height:100%;border:none;';
  iframe.setAttribute('loading', 'lazy');

  wrap.appendChild(closeBtn);
  wrap.appendChild(iframe);
  overlay.appendChild(wrap);
  document.body.appendChild(overlay);

  // ── Open / Close ──
  function openPopup() {
    iframe.src = LEVERAGE_URL;
    overlay.style.display = 'block';
    document.body.style.overflow = 'hidden';
  }

  function closePopup() {
    overlay.style.display = 'none';
    document.body.style.overflow = '';
    iframe.src = 'about:blank';
  }

  closeBtn.addEventListener('click', closePopup);
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closePopup();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closePopup();
  });

  // ── Floating CTA Button ──
  var cta = document.createElement('button');
  cta.id = 'fulcrum-cta';
  cta.textContent = 'Get My Leverage Brief';
  cta.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:99999;background:#27E7FE;color:#000;font-family:Arial,Helvetica,sans-serif;font-size:16px;font-weight:600;padding:14px 28px;border:none;border-radius:12px;cursor:pointer;box-shadow:0 4px 20px rgba(39,231,254,0.4);transition:transform 0.2s,box-shadow 0.2s;';
  cta.addEventListener('mouseenter', function() {
    cta.style.transform = 'translateY(-2px)';
    cta.style.boxShadow = '0 6px 24px rgba(39,231,254,0.5)';
  });
  cta.addEventListener('mouseleave', function() {
    cta.style.transform = '';
    cta.style.boxShadow = '0 4px 20px rgba(39,231,254,0.4)';
  });
  cta.addEventListener('click', openPopup);
  document.body.appendChild(cta);

  // ── Expose globally so any button/link can trigger it ──
  window.openFulcrumBrief = openPopup;
  window.closeFulcrumBrief = closePopup;
})();
</script>
